<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="title-section">
                <h1 class="title">AgentScope</h1>
            </div>
            <div class="header-actions">
                <div id="langToggle" class="lang-toggle" title="切换语言">
                    <div class="toggle-knob">EN</div>
                </div>
                <button id="monitorIndicator" class="btn monitor-btn" title="点击开启/关闭实时监控" onclick="toggleMonitoring()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span data-i18n="monitor">监控</span>
                </button>
                <button id="refreshBtn" class="btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    <span data-i18n="refresh">刷新</span>
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h2 data-i18n="sessions">会话</h2>
                    <div class="search-wrapper">
                        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="搜索..." class="search-input">
                    </div>
                </div>
                <div id="sessionList" class="session-list">
                    <div class="loading" data-i18n="loading">加载中...</div>
                </div>
            </aside>

            <!-- Resizer -->
            <div id="resizer" class="resizer"></div>

            <!-- Content -->
            <section class="content">
                <!-- File Table -->
                <div class="file-table-container">
                    <div class="table-header">
                        <h3 data-i18n="fileChanges">文件改动</h3>
                        <div class="table-actions">
                            <span id="fileCount" class="badge">0</span>
                            <button id="exportBtn" class="btn btn-sm" onclick="exportSession()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                <span data-i18n="export">导出</span>
                            </button>
                        </div>
                    </div>
                    <div class="file-table-wrapper">
                        <table id="fileTable" class="file-table">
                            <thead>
                                <tr>
                                    <th style="width: 100px" data-i18n="risk">RISK</th>
                                    <th data-i18n="file">FILE</th>
                                    <th style="width: 100px" data-i18n="change">CHANGE</th>
                                    <th style="width: 60px" data-i18n="ops">OPS</th>
                                </tr>
                            </thead>
                            <tbody id="fileTableBody">
                                <tr>
                                    <td colspan="4" class="empty-state">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        <p data-i18n="selectSession">选择会话查看改动</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Diff View -->
                <div class="diff-container">
                    <div class="diff-header">
                        <h3 data-i18n="diff">Diff</h3>
                        <div class="diff-mode-switcher">
                            <button class="diff-mode-btn active" data-mode="uncommitted" data-i18n="diffModeUncommitted">未提交改动</button>
                            <button class="diff-mode-btn" data-mode="session" data-i18n="diffModeSession">会话对比</button>
                        </div>
                        <span id="diffFileName" class="diff-filename"></span>
                    </div>
                    <pre id="diffView" class="diff-view"><code data-i18n="selectFile">选择文件查看差异</code></pre>
                </div>
            </section>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="statusSession"><span data-i18n="session">会话</span>: -</span>
            <span id="statusBranch"><span data-i18n="branch">分支</span>: -</span>
            <span id="statusTokens">Token: - <span data-i18n="tokenIn">in</span> / - <span data-i18n="tokenOut">out</span></span>
        </footer>
    </div>

    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
    <script src="./resizer.js"></script>
</body>
</html>
